name: "VPN"
on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vpn:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build VPN and Start Server
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          rm -f index.html server.js req_*.json res_*.json
          git rm --cached index.html server.js 2>/dev/null || true
          git commit -m "Clean slate" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name || 'main' }} --force || true

          cat > index.html << 'HTMLPROXY'
          <!DOCTYPE html>
          <html>
          <head><meta name="viewport" content="width=device-width,initial-scale=1"><title>VPN</title>
          <style>
          *{margin:0;padding:0;box-sizing:border-box} body{background:#0d1117;color:#fff;font-family:system-ui;padding:16px}
          input,button{padding:12px;margin:5px;border-radius:8px;font-size:14px} input{flex:1;background:#1f242f;border:1px solid #3d444d;color:#fff} button{background:#238636;border:none;color:#fff;font-weight:bold;cursor:pointer}
          .token-bar,.url-bar{display:flex;margin-bottom:12px} .content{background:#161b22;border-radius:16px;padding:16px;min-height:400px;overflow:auto;word-break:break-all}
          .status{position:fixed;bottom:10px;left:10px;right:10px;background:rgba(0,0,0,0.85);padding:10px 16px;border-radius:20px;font-size:11px;text-align:center}
          iframe{width:100%;height:500px;border:none} video{max-width:100%} pre{white-space:pre-wrap;font-size:12px}
          </style></head>
          <body>
          <div class="token-bar"><input type="password" id="token" placeholder="GitHub token"><button id="saveToken">💾 ذخیره</button></div>
          <div class="url-bar"><input id="url" placeholder="https://example.com" value="https://example.com"><button id="go">🌐 برو</button></div>
          <div class="content" id="content"><div style="text-align:center;padding:40px;color:#8b949e">🔗 آماده</div></div>
          <div class="status" id="status">⏳ Ready</div>
          <script>
            const REPO = '${{ github.repository }}';
            let TOKEN = localStorage.getItem('vpn_token') || '';
            document.getElementById('token').value = TOKEN;

            function logToParent(msg, level='info'){
              try{ window.parent.postMessage({type:'vpn-log', message:msg, level:level}, '*'); }catch(e){}
              console.log(msg);
            }
            logToParent('✅ VPN (redirect+rewrite)');

            document.getElementById('saveToken').onclick = () => {
              TOKEN = document.getElementById('token').value.trim();
              localStorage.setItem('vpn_token', TOKEN);
              document.getElementById('status').innerHTML = '✅ Token saved';
              logToParent('Token saved');
            };

            window.addEventListener('message', e => {
              if (e.data?.type === 'setToken' && e.data?.token) {
                TOKEN = e.data.token;
                document.getElementById('token').value = TOKEN;
                localStorage.setItem('vpn_token', TOKEN);
                document.getElementById('status').innerHTML = '✅ Token received';
                logToParent('Token received from parent');
              }
              if (e.data?.type === 'navigate') {
                document.getElementById('url').value = e.data.url;
                fetchPage(e.data.url);
              }
            });

            function UUID() {
              return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
                const r = Math.random() * 16 | 0;
                return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
              });
            }

            function parentApiCall(method, path, body) {
              return new Promise((resolve, reject) => {
                const id = UUID();
                const handler = (e) => {
                  if (e.data && e.data.type === 'api-result' && e.data.id === id) {
                    window.removeEventListener('message', handler);
                    if (e.data.ok) resolve(e.data.data);
                    else reject(new Error(e.data.error));
                  }
                };
                window.addEventListener('message', handler);
                window.parent.postMessage({ type:'api-call', id, method, path, body }, '*');
              });
            }

            function escapeHtml(s) {
              return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]);
            }

            // اصلاح URL (افزودن پروتکل و .com در صورت نیاز)
            function fixUrl(rawUrl) {
              let url = rawUrl.trim();
              if (!url.startsWith('http://') && !url.startsWith('https://')) url = 'https://' + url;
              const host = new URL(url).hostname;
              if (!host.includes('.') && host !== 'localhost') url = url.replace(host, host + '.com');
              return url;
            }

            // بازنویسی لینک‌های صفحه برای عبور از پروکسی
            function rewriteHtml(html, baseUrl) {
              // جایگزینی href و src با کلیک‌های سفارشی
              const re = /(<as[^>]*href=")([^"]*)(")|(<imgs[^>]*src=")([^"]*)(")|(<scripts[^>]*src=")([^"]*)(")|(<links[^>]*href=")([^"]*)(")/gi;
              return html.replace(re, (match, p1, p2, p3, p4, p5, p6, p7, p8, p9) => {
                let attrVal = p2 || p5 || p8;
                if (!attrVal || attrVal.startsWith('javascript:') || attrVal.startsWith('#') || attrVal.startsWith('mailto:')) return match;
                try {
                  const absoluteUrl = new URL(attrVal, baseUrl).href;
                  // برای لینک‌ها (href) یک کلیک بی‌صدا اضافه می‌کنیم
                  if (p1) {
                    return `href="${absoluteUrl}" onclick="event.preventDefault();fetchPage('${absoluteUrl}');"`;
                  } else {
                    // برای img, script, link → آنها را از طریق پروکسی fetch می‌کنیم
                    return match.replace(attrVal, `proxy:${absoluteUrl}`);
                  }
                } catch(e) { return match; }
              });
            }

            // دریافت و تزریق منابع خارجی (CSS, JS, تصاویر)
            async function proxyResources(html) {
              const proxyCalls = [];
              html = html.replace(/(proxy:)(https?://[^"'s>]+)/g, (match, prefix, resourceUrl) => {
                const uuid = UUID();
                // ذخیره درخواست برای دریافت منبع
                proxyCalls.push({ uuid, resourceUrl });
                return `proxy-pending:${uuid}`;
              });

              // پردازش موازی منابع
              const results = await Promise.allSettled(proxyCalls.map(async ({uuid, resourceUrl}) => {
                const reqData = { url: resourceUrl, method: 'GET' };
                await parentApiCall('PUT', `req_${uuid}.json`, {
                  message: `Resource ${resourceUrl}`,
                  content: btoa(unescape(encodeURIComponent(JSON.stringify(reqData)))),
                  branch: 'main'
                });
                // انتظار برای پاسخ
                for (let i=0; i<30; i++) {
                  await new Promise(r=>setTimeout(r,1000));
                  try {
                    const resFile = await parentApiCall('GET', `res_${uuid}.json`);
                    const decoded = atob(resFile.content);
                    const data = JSON.parse(decoded);
                    if (data.status === 'done') {
                      return { uuid, body: data.body, type: data.type };
                    }
                  } catch(e) {}
                }
                throw new Error('Timeout for ' + resourceUrl);
              }));

              // جایگزینی proxy-pending با داده واقعی
              results.forEach(result => {
                if (result.status === 'fulfilled') {
                  const {uuid, body, type} = result.value;
                  const bytes = Uint8Array.from(atob(body), c=>c.charCodeAt(0));
                  const blob = new Blob([bytes], {type: type});
                  const blobUrl = URL.createObjectURL(blob);
                  html = html.replace(`proxy-pending:${uuid}`, blobUrl);
                } else {
                  html = html.replace(new RegExp(`proxy-pending:${result.value?.uuid || ''}`, 'g'), '');
                }
              });

              return html;
            }

            async function fetchPage(rawUrl) {
              let currentUrl = fixUrl(rawUrl);
              document.getElementById('url').value = currentUrl;
              if (!TOKEN) { document.getElementById('status').innerHTML='❌ توکن'; return; }

              // حلقه برای دنبال کردن redirectها
              for (let redirectCount = 0; redirectCount < 10; redirectCount++) {
                const uuid = UUID();
                document.getElementById('status').innerHTML = `⏳ ${uuid.slice(0,8)}`;
                document.getElementById('content').innerHTML = '<div style="text-align:center;padding:40px;color:#8b949e">⏳ بارگذاری...</div>';
                logToParent(`Request ${uuid.slice(0,8)}: ${currentUrl}`);

                const reqData = { url: currentUrl, method:'GET', timestamp:Date.now() };
                await parentApiCall('PUT', `req_${uuid}.json`, {
                  message: `Request ${uuid}`,
                  content: btoa(unescape(encodeURIComponent(JSON.stringify(reqData)))),
                  branch: 'main'
                });

                let responseData = null;
                for(let i=0; i<150; i++) {
                  await new Promise(r=>setTimeout(r,2000));
                  try {
                    const resFile = await parentApiCall('GET', `res_${uuid}.json`);
                    const decoded = atob(resFile.content);
                    responseData = JSON.parse(decoded);
                    if(responseData.status==='done'||responseData.status==='redirect'||responseData.status==='error') {
                      break;
                    }
                  } catch(e) {}
                }

                if(!responseData) throw new Error('Timeout');
                if(responseData.status==='error') throw new Error(responseData.error);

                // اگر redirect بود
                if(responseData.status==='redirect' && responseData.location) {
                  currentUrl = new URL(responseData.location, currentUrl).href;
                  document.getElementById('url').value = currentUrl;
                  continue; // درخواست جدید به آدرس redirect
                }

                // پاسخ نهایی (HTML)
                const bytes = Uint8Array.from(atob(responseData.body), c=>c.charCodeAt(0));
                const ct = responseData.type||'text/plain';

                if(ct.includes('html')) {
                  let text = new TextDecoder().decode(bytes);
                  // بازنویسی لینک‌ها
                  text = rewriteHtml(text, currentUrl);
                  // دریافت منابع پروکسی
                  text = await proxyResources(text);
                  // نمایش در iframe با srcdoc
                  document.getElementById('content').innerHTML = `<iframe sandbox="allow-scripts" srcdoc="${escapeHtml(text)}"></iframe>`;
                } else if(ct.includes('video')) {
                  const blob = new Blob([bytes], {type: ct});
                  document.getElementById('content').innerHTML = '<video controls autoplay src="'+URL.createObjectURL(blob)+'"></video>';
                } else if(ct.includes('image')) {
                  const blob = new Blob([bytes], {type: ct});
                  document.getElementById('content').innerHTML = '<img src="'+URL.createObjectURL(blob)+'" style="max-width:100%">';
                } else {
                  document.getElementById('content').innerHTML = '<pre>'+escapeHtml(new TextDecoder().decode(bytes))+'</pre>';
                }

                document.getElementById('status').innerHTML = `✅ ${responseData.statusCode||200}`;
                logToParent('Page loaded');
                return; // پایان موفق
              }
              throw new Error('Too many redirects');
            }

            document.getElementById('go').onclick = ()=>fetchPage(document.getElementById('url').value);
            document.getElementById('url').addEventListener('keydown', e=>{ if(e.key==='Enter') fetchPage(document.getElementById('url').value); });
            if(TOKEN) fetchPage('https://example.com');
          </script>
          </body></html>
          HTMLPROXY

          cat > server.js << 'SERVEREND'
          const http = require('http');
          const https = require('https');
          const url = require('url');

          const TOKEN = process.env.GITHUB_TOKEN;
          const REPO = process.env.GITHUB_REPOSITORY;
          const BRANCH = process.env.GITHUB_REF_NAME || 'main';
          const BASE = `https://api.github.com/repos/${REPO}/contents`;
          const HEADERS = {
            'Authorization': `token ${TOKEN}`,
            'Accept': 'application/vnd.github.v3+json',
            'User-Agent': 'VPN-Server/1.0'
          };

          function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

          async function apiGet(path){
            const res = await fetch(`${BASE}/${path}`,{headers:HEADERS});
            if(!res.ok){ const err=await res.json().catch(()=>({})); throw new Error(err.message); }
            return res.json();
          }

          async function apiPut(path,content,message,sha=null){
            const body={message,content:Buffer.from(content).toString('base64'),branch:BRANCH};
            if(sha) body.sha=sha;
            const res=await fetch(`${BASE}/${path}`,{method:'PUT',headers:{...HEADERS,'Content-Type':'application/json'},body:JSON.stringify(body)});
            if(!res.ok){ const err=await res.json().catch(()=>({})); throw new Error(err.message); }
            return res.json();
          }

          async function apiDelete(path,sha,message){
            const res=await fetch(`${BASE}/${path}`,{method:'DELETE',headers:{...HEADERS,'Content-Type':'application/json'},body:JSON.stringify({message,sha,branch:BRANCH})});
            if(!res.ok){ const err=await res.json().catch(()=>({})); throw new Error(err.message); }
          }

          async function fetchUrl(targetUrl, followRedirects = true) {
            return new Promise((resolve, reject) => {
              const parsed = new url.URL(targetUrl);
              const mod = parsed.protocol === 'https:' ? https : http;
              const opts = {
                hostname: parsed.hostname,
                port: parsed.port || (parsed.protocol === 'https:' ? 443 : 80),
                path: parsed.pathname + parsed.search,
                method: 'GET',
                headers: { 'User-Agent': 'Mozilla/5.0' },
                timeout: 30000,
                // redirect: followRedirects ? 'follow' : 'manual' // manual برای کنترل دستی
              };
              const req = mod.request(opts, (res) => {
                // اگر redirect و manual بود
                if (!followRedirects && res.statusCode >= 300 && res.statusCode < 400 && res.headers.location) {
                  resolve({
                    status: 'redirect',
                    location: res.headers.location,
                    statusCode: res.statusCode
                  });
                  return;
                }
                const chunks = [];
                res.on('data', c => chunks.push(c));
                res.on('end', () => {
                  resolve({
                    status: 'done',
                    body: Buffer.concat(chunks).toString('base64'),
                    type: res.headers['content-type'] || 'text/plain',
                    statusCode: res.statusCode
                  });
                });
              });
              req.on('error', reject);
              req.on('timeout', () => { req.destroy(); reject(new Error('Timeout')); });
              req.end();
            });
          }

          async function processRequest(reqFile, uuid) {
            const reqFileData = await apiGet(`req_${uuid}.json`);
            const decoded = Buffer.from(reqFileData.content, 'base64').toString('utf-8');
            const reqData = JSON.parse(decoded);
            
            // مرحله اول: با redirect: 'manual' درخواست را ارسال کن
            const response = await fetchUrl(reqData.url, false);
            
            if (response.status === 'redirect') {
              // اگر redirect بود، وضعیت redirect را برگردان
              const resContent = JSON.stringify({
                status: 'redirect',
                location: response.location,
                statusCode: response.statusCode,
                timestamp: Date.now()
              });
              await apiPut(`res_${uuid}.json`, resContent, `Redirect to ${response.location}`);
              await apiDelete(`req_${uuid}.json`, reqFileData.sha, `Processed redirect`);
            } else {
              // در غیر اینصورت پاسخ نهایی
              const resContent = JSON.stringify(response);
              await apiPut(`res_${uuid}.json`, resContent, `Response`);
              await apiDelete(`req_${uuid}.json`, reqFileData.sha, `Processed`);
            }
          }

          async function loop(){
            console.log('VPN Server (redirect handling)');
            while(true){
              try{
                const files = await apiGet('');
                if (!Array.isArray(files)) { await sleep(5000); continue; }
                const reqFiles = files.filter(f => f.name.startsWith('req_') && f.name.endsWith('.json'));
                for (const reqFile of reqFiles) {
                  const uuid = reqFile.name.replace('req_', '').replace('.json', '');
                  try {
                    await processRequest(reqFile, uuid);
                  } catch(e) {
                    console.error('Error:', e.message);
                    try {
                      const errContent = JSON.stringify({status:'error', error: e.message, timestamp: Date.now()});
                      await apiPut(`res_${uuid}.json`, errContent, `Error`);
                      await apiDelete(`req_${uuid}.json`, reqFile.sha, `Error`);
                    } catch(e2) {}
                  }
                }
                // پاکسازی فایل‌های res قدیمی
                const now = Date.now();
                const resFiles = files.filter(f => f.name.startsWith('res_') && f.name.endsWith('.json'));
                for (const rf of resFiles) {
                  try {
                    const rdata = await apiGet(rf.name);
                    const parsed = JSON.parse(Buffer.from(rdata.content, 'base64').toString('utf-8'));
                    if (parsed.timestamp && now - parsed.timestamp > 300000) {
                      await apiDelete(rf.name, rdata.sha, 'Cleanup old res');
                    }
                  } catch(e) {}
                }
                await sleep(3000);
              } catch(e) { console.error('Loop:', e.message); }
            }
          }
          loop().catch(e=>{console.error('Fatal:', e);process.exit(1);});
          SERVEREND

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html server.js
          git commit -m "VPN final (redirect+rewrite)" || true
          git push https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:${{ github.ref_name || 'main' }} --force
          node server.js
